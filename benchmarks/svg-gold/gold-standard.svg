<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1024 1024"
  width="1024"
  height="1024"
  role="img"
  aria-labelledby="gold-title gold-description"
  shape-rendering="geometricPrecision"
>
  <title id="gold-title">Semantic Easter line-art gold standard</title>
  <desc id="gold-description">
    A hand-authored vector interpretation of the Cylinder Seal Studio sample.
    Reusable bunny, egg, flower, heart, and leafy-branch symbols are instantiated
    to form a seamless-looking monochrome pattern. This is the known vector source
    for the raster-to-vector recovery benchmark.
  </desc>

  <metadata>
    The artwork is intentionally expressed as semantic SVG primitives and reusable
    symbol instances. It contains no embedded raster images, fonts, filters, masks,
    or generated tracing paths.
  </metadata>

  <defs>
    <style>
      .fixed-stroke,
      .fixed-stroke * {
        vector-effect: non-scaling-stroke;
      }
    </style>

